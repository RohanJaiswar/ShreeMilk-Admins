<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invoice - Shreeji Milk Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <style>
    :root {
      --primary: #14532D; /* Deep Green */
      --text-main: #0F172A;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --bg-light: #f8fafc;
    }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 40px;
      background: #f0f2f5;
      color: var(--text-main);
    }
    .invoice-box {
      max-width: 800px;
      margin: auto;
      padding: 30px 40px;
      background: #fff;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      position: relative;
    }
    .invoice-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      background: #f1f5f9; /* Light slate/grey background */
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .brand-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-box img {
      height: 60px;
      width: 120px;
      object-fit: contain;
      border-radius: 50%;
      border: 2px solid var(--primary);
      padding: 4px;
      background: transparent;
      mix-blend-mode: multiply; /* This removes the white background of the image itself */
    }
    .brand-info h1 {
      margin: 0 0 4px 0;
      font-size: 26px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 0.5px;
    }
    .brand-info p {
      margin: 0;
      font-size: 12px;
      color: var(--text-muted);
      max-width: 250px;
      line-height: 1.5;
    }
    .header-right {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      text-align: right;
    }
    .contact-info {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-top: 5px;
    }
    .contact-info strong {
      color: var(--text-main);
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .qrcode-wrapper {
      padding: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    
    .meta-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      background: var(--bg-light);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .meta-col .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .meta-col .val {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
    }

    .bill-to {
      margin-bottom: 20px;
    }
    .bill-to h3 {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 0 10px 0;
    }
    .bill-to p {
      margin: 4px 0;
      font-size: 15px;
      color: var(--text-main);
    }
    .bill-to strong {
      font-size: 18px;
      display: block;
      margin-bottom: 6px;
    }

    table.modern-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    table.modern-table th, table.modern-table td {
      padding: 10px 12px;
      text-align: left;
      font-size: 13px;
    }
    table.modern-table th {
      background: var(--bg-light);
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
    }
    table.modern-table td {
      border-bottom: 1px solid var(--border);
    }
    .center { text-align: center !important; }
    .right { text-align: right !important; }
    
    .totals-container {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }
    .totals-table {
      width: 300px;
      border-collapse: collapse;
    }
    .totals-table td {
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text-main);
      border-bottom: 1px solid var(--border);
    }
    .totals-table td.label {
      font-weight: 600;
      color: var(--text-muted);
    }
    .totals-table tr.grand-total td {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary);
      border-bottom: none;
      border-top: 2px solid var(--text-main);
      padding-top: 16px;
    }

    .invoice-footer {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      font-size: 11px;
    }
    .terms {
      color: var(--text-muted);
      line-height: 1.8;
    }
    .terms h4 {
      margin: 0 0 8px 0;
      color: var(--text-main);
      font-size: 13px;
    }
    .signature {
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .signature-line {
      width: 150px;
      border-top: 1px solid var(--text-main);
      margin-top: 40px;
      padding-top: 8px;
      font-weight: 600;
    }

    @media print {
      @page {
        size: A4;
        margin: 5mm;
      }
      body {
        background: #fff;
        padding: 0;
        font-size: 11px; /* Slightly smaller text for print to fit A4 */
      }
      .invoice-box {
        box-shadow: none;
        border: none;
        border-radius: 0;
        padding: 0;
        max-width: 100%;
        height: 287mm; /* Total A4 height minus margins */
        display: flex;
        flex-direction: column;
        page-break-after: always;
      }
      .invoice-header {
        margin-bottom: 15px;
        padding: 12px; /* Less padding for print to save space */
        background: #f1f5f9 !important; /* Force background color to print */
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .meta-row {
        margin-bottom: 15px;
        padding: 10px 12px;
      }
      .bill-to {
        margin-bottom: 15px;
      }
      .totals-container {
        margin-bottom: auto; /* Pushes the footer to the bottom */
      }
      table.modern-table th, table.modern-table td {
        padding: 6px 10px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div id="invoices-container"></div>

  <script>
    const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
    const displayDate = new Date().toLocaleDateString('en-IN', dateOptions);

    const urlParams = new URLSearchParams(window.location.search);
    const isBulk = urlParams.get('bulk') === 'true';
    const orderIdParam = urlParams.get('id');

    async function loadInvoices() {
      try {
        const SUPABASE_URL = 'https://tqtvxtipqbnvyquljgtg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_na3VEkRe9gb7Nysy5crL1g_oR-M2W9x';
        
        if (!window.supabase) {
           throw new Error("Supabase library not loaded.");
        }
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let orders = [];
        if (orderIdParam) {
          const { data, error } = await supabaseClient
            .from('orders')
            .select('*, vendors(address)')
            .eq('id', orderIdParam);
          if (error) throw error;
          orders = data || [];
        } else if (isBulk) {
          const today = new Date().toISOString().split('T')[0];
          const { data, error } = await supabaseClient
            .from('orders')
            .select('*, vendors(address)')
            .eq('order_date', today);
          if (error) throw error;
          orders = data || [];
        } else {
          orders = [{
            id: 'ORD-1043',
            vendor_name: 'Patel Provision',
            vendor_zone: 'Zone B (Central)',
            phone_number: '+91 76543 21098',
            vendors: { address: 'Shop No. 12, Main Market' },
            total_amount: 5350,
            items: JSON.stringify([
              { name: 'Analog Cheez Paneer', qty: 15, price: 240 },
              { name: 'Shree Dahi Can', qty: 5, price: 350 }
            ])
          }];
        }

        if (orders.length === 0) {
          document.getElementById('invoices-container').innerHTML = '<h2 style="text-align:center; margin-top:50px;">No orders found to print.</h2>';
          return;
        }

        const container = document.getElementById('invoices-container');
        let htmlContent = '';

        orders.forEach((o, index) => {
          const safeId = o.id ? String(o.id) : '';
          const invNo = safeId ? safeId.substring(0, 8).toUpperCase() : 'N/A';
          const vendorName = o.vendor_name || 'N/A';
          const totalAmount = parseFloat(o.total_amount || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 });
          
          let items = [];
          try {
            items = typeof o.items === 'string' ? JSON.parse(o.items) : (o.items || []);
          } catch(e) {}
          
          let itemsHtml = '';
          if (items && items.length > 0) {
            itemsHtml = items.map((item, i) => {
              const qty = item.qty || item.quantity || 1;
              const price = parseFloat(item.price || item.unit_price || 0);
              const total = qty * price;
              return `
                <tr>
                  <td class="center" style="color:var(--text-muted);">${i + 1}</td>
                  <td><strong style="color:var(--text-main);">${item.name || item.product_name || 'Product'}</strong></td>
                  <td class="center text-muted">—</td>
                  <td class="center">${qty}</td>
                  <td class="right">₹ ${price.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
                  <td class="right" style="font-weight:600;">₹ ${total.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
                </tr>
              `;
            }).join('');
          } else {
            itemsHtml = `<tr><td colspan="6" class="center">No items available</td></tr>`;
          }

          const pageBreak = index < orders.length - 1 ? 'page-break-after: always;' : '';

          htmlContent += `
            <div class="invoice-box" style="${pageBreak}">
              
              <div class="invoice-header">
                <div class="brand-section">
                  <div class="logo-box">
                    <img src="assets/logo-invoice.png" alt="Logo" onerror="this.src='assets/logo-shree.png'; this.style.borderRadius='0'; this.style.border='none';">
                  </div>
                  <div class="brand-info">
                    <h1>SHREE JI MILK CENTER</h1>
                    <p>Kamgar Nagar, S. G. Barve Marg, Station Road, Kurla (E.), Mumbai - 400 024.</p>
                  </div>
                </div>
                <div class="header-right">
                  <div class="contact-info">
                    <strong>Contact Us</strong>
                    8850853778<br>
                    7718950155
                  </div>
                  <div class="qrcode-wrapper" id="qrcode-${safeId}"></div>
                </div>
              </div>

              <div class="meta-row">
                <div class="meta-col">
                  <div class="label">Invoice Number</div>
                  <div class="val">INV-${invNo}</div>
                  <div style="margin-top: 8px;"><svg id="barcode-${safeId}"></svg></div>
                </div>
                <div class="meta-col" style="text-align: right;">
                  <div class="label">Date of Issue</div>
                  <div class="val">${displayDate}</div>
                </div>
              </div>

              <div class="bill-to">
                <h3>Billed To (M/s.)</h3>
                <strong>${vendorName}</strong>
                <p>${o.vendors && o.vendors.address ? o.vendors.address : 'Address not provided'}</p>
                <p>Zone: ${o.vendor_zone || 'N/A'}</p>
                <p>Phone: ${o.phone_number || 'N/A'}</p>
              </div>

              <table class="modern-table">
                <thead>
                  <tr>
                    <th class="center" style="width: 8%;">Sr. No.</th>
                    <th style="width: 40%;">Particular</th>
                    <th class="center" style="width: 12%;">Tray Return</th>
                    <th class="center" style="width: 10%;">Qty</th>
                    <th class="right" style="width: 15%;">Rate</th>
                    <th class="right" style="width: 15%;">Amount</th>
                  </tr>
                </thead>
                <tbody>
                  ${itemsHtml}
                </tbody>
              </table>

              <div class="totals-container">
                <table class="totals-table">
                  <tr>
                    <td class="label">Advance (ADV.)</td>
                    <td class="right">—</td>
                  </tr>
                  <tr>
                    <td class="label">Balance (BAL.)</td>
                    <td class="right">—</td>
                  </tr>
                  <tr class="grand-total">
                    <td class="label" style="color:var(--primary);">TOTAL</td>
                    <td class="right">₹ ${totalAmount}</td>
                  </tr>
                </table>
              </div>

              <div class="invoice-footer">
                <div class="terms">
                  <h4>Terms & Conditions</h4>
                  <div>• Goods Once Sold Will Not Be Taken Back.</div>
                  <div>• No Exchange No Return.</div>
                  <div>• Milk & Milk Products Manufacture.</div>
                  <div style="margin-top: 6px; font-weight: 600;">E. & O.E.</div>
                </div>
                <div class="signature">
                  <div class="signature-line">For Shree Ji Milk Center</div>
                </div>
              </div>

            </div>
          `;
        });

        container.innerHTML = htmlContent;

        orders.forEach(o => {
          if (o.id) {
            const safeId = String(o.id);
            const invNo = safeId.substring(0, 8).toUpperCase();
            new QRCode(document.getElementById(`qrcode-${safeId}`), {
              text: safeId,
              width: 80,
              height: 80,
              colorDark : "#0F172A",
              colorLight : "#ffffff",
              correctLevel : QRCode.CorrectLevel.M
            });
            JsBarcode(`#barcode-${safeId}`, "INV-" + invNo, {
              format: "CODE128",
              height: 25,
              width: 1.2,
              displayValue: false,
              margin: 0
            });
          }
        });

        setTimeout(() => { window.print(); }, 1000);

      } catch (err) {
        console.error("Error loading invoices:", err);
        document.getElementById('invoices-container').innerHTML = '<h2 style="color:red; text-align:center;">Failed to load invoices.</h2>';
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadInvoices);
    } else {
      loadInvoices();
    }
  </script>
</body>
</html>
